# This is a Databricks asset bundle definition for adb_test.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: adb_test
  uuid: ed6c4b08-1cea-47e3-9dbb-c55162a23c3c

include:
  - resources/*.yml                           # this includes the sample_job.job.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-279469438045347.7.azuredatabricks.net
    variables:
      catalog: adb_dev
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-279469438045347.7.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/admin@mngenvmcap372892.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Users/admin@mngenvmcap372892.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: adb_dev
      schema: prod
    permissions:
      - user_name: admin@mngenvmcap372892.onmicrosoft.com
        level: CAN_MANAGE

# if you want to deploy notebooks to a shared location for all users to access
  shared:
    workspace:
      host: https://adb-279469438045347.7.azuredatabricks.net
      root_path: /Workspace/Shared/adb_test
    sync:
      include:
        - 'src/**/*.ipynb'
        - 'src/**/*.py'
      exclude:
        - 'tests/**'
    variables:
      catalog: adb_dev
      schema: shared

  trial:
    mode: development
    workspace:
      host: https://adb-294236827790884.4.azuredatabricks.net
    variables:
      catalog: adb_trial
      schema: ${workspace.current_user.short_name}
