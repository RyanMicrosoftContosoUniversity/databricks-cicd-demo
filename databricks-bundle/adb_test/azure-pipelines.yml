# Azure DevOps Pipeline for Databricks Asset Bundle Deployment
# Prerequisites:
# 1. Create a Variable Group named 'databricks-tokens' in Pipelines → Library
# 2. Add these secrets to the variable group:
#    - DATABRICKS_TOKEN_DEV: PAT token for dev workspace
#    - DATABRICKS_TOKEN_TRIAL: PAT token for trial workspace
#    - DATABRICKS_TOKEN_PROD: PAT token for prod workspace (optional)

trigger:
  branches:
    include:
      - main
      - develop

pool:
  name: 'Default'

parameters:
  - name: environment
    displayName: Deployment Environment
    type: string
    default: 'DEV'
    values:
      - 'DEV'
      - 'TRIAL'
      - 'PROD'

variables:
  - name: BUNDLE_PATH
    value: 'databricks-bundle/adb_test'
  - name: targetEnvironment
    value: ${{ parameters.environment }}

stages:
  - stage: Validate
    displayName: 'Validate Bundle'
    jobs:
      - job: ValidateBundle
        displayName: 'Validate Databricks Bundle'
        steps:
          - script: |
              python --version
              pip --version
            displayName: 'Verify Python Installation'

          - script: |
              REM print full working directory for debugging
              dir
            displayName: 'Check Working Directory'

          - script: |
              cd $(BUNDLE_PATH)
              databricks bundle validate -t dev
            displayName: 'Validate Bundle Configuration'
            env:
              DATABRICKS_HOST: https://adb-279469438045347.7.azuredatabricks.net
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN_DEV)

  - stage: DeployDev
    displayName: 'Deploy to Dev'
    dependsOn: Validate
    condition: eq(variables['targetEnvironment'], 'DEV')
    jobs:
      - job: DeployToDev
        displayName: 'Deploy to Dev Workspace'
        steps:
          - script: |
              cd $(BUNDLE_PATH)
              databricks bundle deploy -t dev
            displayName: 'Deploy Bundle to Dev'
            env:
              DATABRICKS_HOST: https://adb-279469438045347.7.azuredatabricks.net
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN_DEV)

  - stage: DeployTrial
    displayName: 'Deploy to Trial'
    dependsOn: Validate
    condition: eq(variables['targetEnvironment'], 'TRIAL')
    jobs:
      - job: DeployToTrial
        displayName: 'Deploy to Trial Workspace'
        steps:
          - script: |
              cd $(BUNDLE_PATH)
              databricks bundle deploy -t trial
            displayName: 'Deploy Bundle to Trial'
            env:
              DATABRICKS_HOST: https://adb-294236827790884.4.azuredatabricks.net
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN_TRIAL)

  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: 
      - Validate
    condition: eq(variables['targetEnvironment'], 'PROD')
    jobs:
      - deployment: DeployToProd
        displayName: 'Deploy to Prod Workspace'
        environment: 'production'  # Requires approval in Azure DevOps
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                
                - script: |
                    cd $(BUNDLE_PATH)
                    databricks bundle deploy -t prod
                  displayName: 'Deploy Bundle to Prod'
                  env:
                    DATABRICKS_HOST: https://adb-3099059039792312.12.azuredatabricks.net
                    DATABRICKS_TOKEN: $(DATABRICKS_TOKEN_PROD)
